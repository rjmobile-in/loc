<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RJ Mobile | Store Locations</title>
  
  <script>
    if (localStorage.getItem('rj_theme') === 'light') { 
      document.documentElement.classList.add('light-theme'); 
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
  
  <style>
    /* =========================================================
       1. ROOT VARIABLES & THEME (Slate Palette)
       ========================================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      /* Dark Theme (Default) */
      --bg-base: #0f172a; 
      --card-bg: #1e293b; 
      --card-border: #334155;
      
      --primary: #3b82f6; 
      --primary-hover: #2563eb; 
      --primary-alpha: rgba(59, 130, 246, 0.15);
      
      --text-main: #f8fafc; 
      --text-soft: #94a3b8;
      
      --success: #10b981;
      --success-alpha: rgba(16, 185, 129, 0.15);
      
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
      
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --radius-xl: 24px;
    }

    html.light-theme {
      /* Light Theme */
      --bg-base: #f1f5f9; 
      --card-bg: #ffffff; 
      --card-border: #e2e8f0;
      
      --primary: #4f46e5; 
      --primary-hover: #4338ca; 
      --primary-alpha: rgba(79, 70, 229, 0.1);
      
      --text-main: #0f172a; 
      --text-soft: #64748b; 
      
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
    }
    
    html { -webkit-font-smoothing: antialiased; }
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-base);
      color: var(--text-main);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 16px 64px;
      transition: background-color 0.3s ease, color 0.3s ease;
      position: relative;
    }

    h1, h2, h3, .brand-title { font-family: 'Plus Jakarta Sans', sans-serif; }

    /* Theme Toggle Button */
    .theme-toggle-btn {
      position: absolute;
      top: 24px;
      right: 24px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text-soft);
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s;
      box-shadow: var(--shadow-sm);
    }
    .theme-toggle-btn:hover { color: var(--primary); border-color: var(--primary); transform: translateY(-2px); box-shadow: var(--shadow-md); }

    /* =========================================================
       2. HEADER SECTION
       ========================================================= */
    .header { display: flex; flex-direction: column; align-items: center; gap: 16px; margin-bottom: 32px; text-align: center; }
    
    .logo-container {
      width: 80px; height: 80px; 
      background: var(--card-bg); 
      border-radius: var(--radius-lg);
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-md); 
      border: 1px solid var(--card-border);
      overflow: hidden; flex-shrink: 0;
      margin-bottom: 8px;
    }
    .logo-container img { width: 70%; height: 70%; object-fit: contain; }
    
    .headline { font-size: clamp(24px, 6vw, 32px); font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; line-height: 1.2; }
    .headline em { font-style: normal; color: var(--primary); }
    .subline { font-size: 15px; color: var(--text-soft); line-height: 1.6; max-width: 400px; font-weight: 500; }
    
    /* =========================================================
       3. LINKS CARD & BUTTONS
       ========================================================= */
    .links-card {
      background: var(--card-bg); 
      border-radius: var(--radius-xl);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow-md);
      width: 100%; max-width: 520px; 
      padding: 32px;
      display: flex; flex-direction: column; gap: 16px;
    }
    
    .location-action-btn {
      font-family: 'Inter', sans-serif;
      background: var(--bg-base); 
      border: 1px solid var(--card-border);
      border-radius: var(--radius-md); 
      padding: 16px 20px; 
      width: 100%; 
      cursor: pointer;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: var(--shadow-sm);
    }
    
    .location-action-btn:hover { 
        background: var(--card-bg); 
        border-color: var(--primary); 
        transform: translateY(-3px); 
        box-shadow: var(--shadow-md); 
    }
    .location-action-btn:active { transform: scale(0.98); }
    .location-action-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; border-color: var(--card-border); }
    
    .location-info { display: flex; align-items: center; gap: 16px; text-align: left; }
    .location-icon {
      width: 44px; height: 44px; border-radius: var(--radius-sm);
      background: var(--primary-alpha); 
      display: flex; align-items: center; justify-content: center; color: var(--primary);
      flex-shrink: 0; transition: all 0.2s;
    }
    
    /* Google Maps Pin Hover Effect */
    .location-action-btn:hover .location-icon { background: rgba(234, 67, 53, 0.15); color: #EA4335; }

    /* Special styles for "Nearest" feature */
    .find-nearest-btn { border-color: var(--primary); background: var(--primary-alpha); margin-bottom: 8px; }
    .find-nearest-btn .location-icon { background: var(--primary); color: #fff; }
    .find-nearest-btn:hover { background: var(--primary); }
    .find-nearest-btn:hover .location-icon { background: #fff; color: var(--primary); }
    .find-nearest-btn:hover .btn-title, .find-nearest-btn:hover .btn-subtitle, .find-nearest-btn:hover .action-icon { color: #fff; }
    
    /* Distance Badges */
    .distance-badge { font-size: 11px; font-weight: 600; margin-left: 8px; padding: 3px 8px; background: var(--bg-base); color: var(--text-soft); border-radius: 6px; vertical-align: middle; border: 1px solid var(--card-border); }
    .distance-badge.nearest-badge { color: var(--success); background: var(--success-alpha); font-weight: 700; border-color: var(--success-alpha); }
    
    .is-nearest { border-color: var(--success) !important; background: var(--success-alpha) !important; }
    .is-nearest:hover { border-color: var(--success) !important; }

    .btn-text-group { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
    .btn-title { font-size: 15px; font-weight: 700; color: var(--text-main); transition: color 0.2s; }
    .btn-subtitle { font-size: 13px; color: var(--text-soft); font-weight: 500; transition: color 0.2s; line-height: 1.4; }
    
    .action-icon { color: var(--text-soft); transition: color 0.2s; }
    .location-action-btn:hover .action-icon { color: var(--primary); }
    
    /* =========================================================
       4. TOAST & FOOTER
       ========================================================= */
    #toast { 
        position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px); 
        background: var(--card-bg); border: 1px solid var(--card-border); color: var(--text-main); 
        font-size: 14px; font-weight: 600; padding: 14px 24px; border-radius: var(--radius-lg); 
        opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
        white-space: nowrap; z-index: 9999; box-shadow: var(--shadow-md); 
        display: flex; align-items: center; gap: 8px;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    
    .footer { margin-top: 40px; font-size: 13px; color: var(--text-soft); text-align: center; font-weight: 600; }

    @media (max-width: 480px) {
      body { padding: 32px 16px 52px; }
      .links-card { padding: 24px; border-radius: var(--radius-lg); }
      .location-action-btn { padding: 14px 16px; }
      .theme-toggle-btn { top: 16px; right: 16px; }
    }
  </style>
</head>
<body>

  <!-- Theme Toggle Logic -->
  <script>
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const isLight = document.documentElement.classList.toggle('light-theme');
      localStorage.setItem('rj_theme', isLight ? 'light' : 'dark');
    });
  </script>

  <script>
    let toastTimer;
    let distancesCalculated = false; 

    function showToast(msg) {
      const t = document.getElementById('toast');
      document.getElementById('toast-text').textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    function openLocation(btn, locationName, url) {
      const allBtns = document.querySelectorAll('.location-action-btn');
      allBtns.forEach(b => b.disabled = true);

      const titleEl = btn.querySelector('.btn-title');
      
      const badge = titleEl.querySelector('.distance-badge');
      const badgeHTML = badge ? badge.outerHTML : '';
      
      let originalText = titleEl.textContent;
      if (badge) {
        originalText = originalText.replace(badge.textContent, '').trim();
      }
      
      titleEl.innerHTML = 'Opening...' + badgeHTML;
      btn.style.borderColor = 'var(--primary)';
      btn.style.background = 'var(--card-bg)';
      
      showToast('Opening ' + locationName + ' in Maps...');
      
      setTimeout(() => {
        window.open(url, '_blank', 'noopener,noreferrer');
        setTimeout(() => {
          titleEl.innerHTML = originalText + badgeHTML;
          btn.style.borderColor = '';
          btn.style.background = '';
          allBtns.forEach(b => b.disabled = false);
        }, 800);
      }, 500);
    }

    function calculateStraightLine(lat1, lon1, lat2, lon2) {
      const R = 6371e3; 
      const phi1 = lat1 * Math.PI/180;
      const phi2 = lat2 * Math.PI/180;
      const deltaPhi = (lat2-lat1) * Math.PI/180;
      const deltaLambda = (lon2-lon1) * Math.PI/180;
      const a = Math.sin(deltaPhi/2) * Math.sin(deltaPhi/2) +
                Math.cos(phi1) * Math.cos(phi2) *
                Math.sin(deltaLambda/2) * Math.sin(deltaLambda/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c; 
    }

    function renderAndSortBranches(branches, distanceArray) {
      branches.forEach((branch, index) => {
        const distanceInMeters = distanceArray[index]; 
        branch.setAttribute('data-distance', distanceInMeters); 
        
        const titleEl = branch.querySelector('.btn-title');
        const km = (distanceInMeters / 1000).toFixed(1);
        
        // Exclusively output `<number> km`
        titleEl.innerHTML += ` <span class="distance-badge">${km} km</span>`;
      });

      branches.sort((a, b) => parseFloat(a.getAttribute('data-distance')) - parseFloat(b.getAttribute('data-distance')));

      const container = document.getElementById('locationsContainer');
      branches.forEach(branch => container.appendChild(branch));

      if (branches.length > 0) {
        const closestBranch = branches[0];
        closestBranch.classList.add('is-nearest');
        const nearestBadge = closestBranch.querySelector('.distance-badge');
        nearestBadge.classList.add('nearest-badge');
      }

      distancesCalculated = true;
    }

    function findNearestBranch(btn) {
      if (distancesCalculated) {
        showToast("Distances are already calculated and sorted.");
        return;
      }

      if (!navigator.geolocation) {
        showToast("Geolocation is not supported by your browser.");
        return;
      }

      btn.querySelector('.btn-title').textContent = "Calculating...";
      
      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const userLat = position.coords.latitude;
          const userLng = position.coords.longitude;
          const branches = Array.from(document.querySelectorAll('.branch-btn'));
          
          let coordString = `${userLng},${userLat}`;
          branches.forEach(branch => {
            coordString += `;${branch.getAttribute('data-lng')},${branch.getAttribute('data-lat')}`;
          });

          try {
            const response = await fetch(`https://router.project-osrm.org/table/v1/driving/${coordString}?sources=0&annotations=distance`);
            const data = await response.json();

            if (data.code !== 'Ok') throw new Error('OSRM API Error');

            const drivingDistances = data.distances[0].slice(1);
            renderAndSortBranches(branches, drivingDistances);
            showToast("Nearest driving routes found!");

          } catch (error) {
            console.warn("OSRM routing failed, falling back to straight-line math.", error);
            
            const straightLineDistances = branches.map(branch => {
              return calculateStraightLine(
                userLat, userLng, 
                parseFloat(branch.getAttribute('data-lat')), 
                parseFloat(branch.getAttribute('data-lng'))
              );
            });

            renderAndSortBranches(branches, straightLineDistances);
            showToast("Showing straight line distance calculations.");
          }

          btn.querySelector('.btn-title').textContent = "Distances Calculated";
          btn.style.opacity = "0.7"; 
          btn.style.cursor = "default";
        },
        (error) => {
          console.error(error);
          showToast("Location access denied or unavailable.");
          btn.querySelector('.btn-title').textContent = "Find Nearest Branch";
        },
        { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
      );
    }
  </script>
